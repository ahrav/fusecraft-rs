name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.87)
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.87)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.87)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Only fusecraft-core is dry-runnable pre-publication. It has no
      # workspace-internal dependencies, so cargo can fully verify its manifest
      # against crates.io. This gate catches broken metadata (missing
      # description, unknown category slugs, nonexistent readme paths, etc.)
      # before release.
      #
      # We deliberately do NOT dry-run fusecraft-fuser or fusecraft-cli here:
      # both depend on fusecraft-core via a combined path+version dependency,
      # and `cargo publish --dry-run` resolves the `version` through the
      # registry rather than the workspace path. Until fusecraft-core has been
      # published at the matching version, those dry-runs always fail with
      # "no matching package named `fusecraft-core` found". See
      # docs/publishing.md for the manual publish order.
      - name: Dry-run publish fusecraft-core
        run: cargo publish --dry-run -p fusecraft-core --allow-dirty
