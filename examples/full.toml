# Full configuration: demonstrates every supported key.
# This file is a reference; copy and modify for your workload.
seed = 42

[mount]
fs_name = "fusecraft"
subtype = "sim"
auto_unmount = true
default_permissions = true
read_only = false
direct_io = false

[files]
inode_count = 1000
file_size_bytes = 65536
root_layout = "flat"
write_mode = "discard"

[ops.lookup]
concurrency_cap = 64
queue_cap = 128

[ops.lookup.latency]
base_us = 10
lognormal_median_us = 50.0
lognormal_sigma = 0.4
pareto_weight = 0.01
pareto_xm_us = 2000.0
pareto_alpha = 1.5
max_us = 500000

[ops.getattr]
concurrency_cap = 64
queue_cap = 128

[ops.getattr.latency]
base_us = 5
lognormal_median_us = 30.0
lognormal_sigma = 0.3
pareto_weight = 0.0
pareto_xm_us = 1000.0
pareto_alpha = 1.5
max_us = 200000

[ops.open]
concurrency_cap = 32
queue_cap = 64

[ops.open.latency]
base_us = 20
lognormal_median_us = 80.0
lognormal_sigma = 0.5
pareto_weight = 0.02
pareto_xm_us = 3000.0
pareto_alpha = 1.3
max_us = 1000000

[[ops.open.faults]]
op = "open"
errno = "ENOENT"
rate = 0.001

[ops.read]
concurrency_cap = 64
queue_cap = 256

[ops.read.latency]
base_us = 50
lognormal_median_us = 200.0
lognormal_sigma = 0.6
pareto_weight = 0.05
pareto_xm_us = 5000.0
pareto_alpha = 1.2
max_us = 2000000

[ops.read.bandwidth]
mib_per_sec = 100.0
burst_bytes = 1048576

[[ops.read.faults]]
op = "read"
errno = "EIO"
rate = 0.001

[[ops.read.faults]]
op = "read"
errno = "EAGAIN"
rate = 0.005

[ops.write]
concurrency_cap = 32
queue_cap = 128

[ops.write.latency]
base_us = 100
lognormal_median_us = 400.0
lognormal_sigma = 0.7
pareto_weight = 0.03
pareto_xm_us = 8000.0
pareto_alpha = 1.1
max_us = 5000000

[ops.write.bandwidth]
mib_per_sec = 50.0
burst_bytes = 524288

[[ops.write.faults]]
op = "write"
errno = "ENOSPC"
rate = 0.002

[ops.flush]
concurrency_cap = 32

[ops.flush.latency]
base_us = 10
lognormal_median_us = 50.0
lognormal_sigma = 0.3
max_us = 500000

[ops.release]
concurrency_cap = 64

[ops.release.latency]
base_us = 5
lognormal_median_us = 20.0
lognormal_sigma = 0.2
max_us = 100000

[ops.fsync]
concurrency_cap = 16
queue_cap = 32

[ops.fsync.latency]
base_us = 500
lognormal_median_us = 2000.0
lognormal_sigma = 0.8
pareto_weight = 0.1
pareto_xm_us = 20000.0
pareto_alpha = 1.0
max_us = 10000000

[[ops.fsync.faults]]
op = "fsync"
errno = "EIO"
rate = 0.005

[ops.readdir]
concurrency_cap = 32

[ops.readdir.latency]
base_us = 100
lognormal_median_us = 500.0
lognormal_sigma = 0.5
max_us = 2000000

[ops.statfs]
concurrency_cap = 16

[ops.statfs.latency]
base_us = 10
lognormal_median_us = 30.0
lognormal_sigma = 0.3
max_us = 100000

[metrics]
jsonl_path = "/tmp/fusecraft-events.jsonl"
