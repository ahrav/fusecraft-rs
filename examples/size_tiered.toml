# Size-tiered policy: small I/O lands in a fast local cache tier while large
# I/O spills to a slower remote streaming tier. Models backends like
# grotto-rs's 128 KiB split between pre-buffered hits and NFS streaming,
# tiered object stores (Glacier instant vs. standard), or any path where the
# per-request latency/bandwidth profile depends on payload size.
#
# Scenario:
#   - Reads and writes with `len <= 128 KiB` use the base policy: fast,
#     cache-hit latency and no bandwidth throttle.
#   - Reads and writes with `len >  128 KiB` route to the large tier: much
#     higher base latency and a ~850 MiB/s bandwidth cap, so sustained large
#     transfers pay both a per-op latency premium and a throughput ceiling.
#   - `concurrency_cap` and `queue_cap` are NOT tiered: they belong to the
#     single limiter queue per op and govern admission before the tier split.
#
# Use this config to exercise application code that must:
#   - Batch I/O toward the small-size sweet spot.
#   - Tolerate p99 latency jumps when a request crosses the tier boundary.
#   - Respect the large-tier throughput ceiling under concurrent streaming.
seed = 424242

[mount]
auto_unmount = false
default_permissions = true
read_only = false
direct_io = false

[files]
inode_count = 100
# 4 MiB files — comfortably above the 128 KiB tier threshold so a single
# read-all or large-range read routes to the large tier.
file_size_bytes = 4194304
root_layout = "flat"
write_mode = "discard"

[ops.read]
concurrency_cap = 64
queue_cap = 128

# Small-tier latency: ~2 ms base, typical of a warm pre-buffered hit.
[ops.read.latency]
base_us = 2000
lognormal_median_us = 500.0
lognormal_sigma = 0.3
pareto_weight = 0.0
pareto_xm_us = 1.0
pareto_alpha = 1.5
max_us = 500000

[ops.read.size_tier]
# 128 KiB split: requests longer than this route to the large tier.
threshold_bytes = 131072

# Large-tier latency: ~50 ms base, typical of a network object-store streaming
# round-trip.
[ops.read.size_tier.large.latency]
base_us = 50000
lognormal_median_us = 10000.0
lognormal_sigma = 0.5
pareto_weight = 0.02
pareto_xm_us = 50000.0
pareto_alpha = 1.3
max_us = 2000000

# Large-tier bandwidth ceiling: ~850 MiB/s sustained with a 1 MiB burst. Only
# large requests are throttled — small cache hits stay unimpaired.
[ops.read.size_tier.large.bandwidth]
mib_per_sec = 850.0
burst_bytes = 1048576

[ops.write]
concurrency_cap = 32
queue_cap = 64

[ops.write.latency]
base_us = 2000
lognormal_median_us = 500.0
lognormal_sigma = 0.3
max_us = 500000

[ops.write.size_tier]
threshold_bytes = 131072

[ops.write.size_tier.large.latency]
base_us = 50000
lognormal_median_us = 10000.0
lognormal_sigma = 0.5
pareto_weight = 0.02
pareto_xm_us = 50000.0
pareto_alpha = 1.3
max_us = 2000000

[ops.write.size_tier.large.bandwidth]
mib_per_sec = 850.0
burst_bytes = 1048576

[ops.open]
concurrency_cap = 32
queue_cap = 64

[ops.open.latency]
base_us = 100
lognormal_median_us = 150.0
lognormal_sigma = 0.3
max_us = 200000

[ops.getattr]
concurrency_cap = 64

[ops.getattr.latency]
base_us = 20
lognormal_median_us = 40.0
lognormal_sigma = 0.3
max_us = 100000

[ops.lookup]
concurrency_cap = 64

[ops.lookup.latency]
base_us = 20
lognormal_median_us = 40.0
lognormal_sigma = 0.3
max_us = 100000

[metrics]
jsonl_path = "/tmp/fusecraft-size-tiered.jsonl"
