# Zero-latency profile: useful for smoke tests and determinism assertions.
#
# Every operation samples a constant latency of 0 µs (no lognormal body,
# no Pareto tail) and no faults are configured. Reads and writes still
# participate in the full lifecycle (concurrency limiter, event log,
# metrics histogram) — just with no injected delay or failure.
#
# Use this config to:
#   - Benchmark fusecraft's own overhead.
#   - Validate that a workload runs cleanly before enabling fault/latency.
#   - Drive diff-based determinism tests (same seed, same event stream).
seed = 1

[mount]
auto_unmount = false
default_permissions = false
read_only = false
direct_io = false

[files]
inode_count = 64
file_size_bytes = 4096
root_layout = "flat"
write_mode = "discard"

# A single template policy is replicated across every op below. Every field
# is pinned to a zero-latency configuration; the lognormal/Pareto components
# contribute nothing because their parameters are either 0 or weighted to 0.

[ops.lookup]
concurrency_cap = 32
queue_cap = 0

[ops.lookup.latency]
base_us = 0
lognormal_median_us = 0.0
lognormal_sigma = 0.0
pareto_weight = 0.0
pareto_xm_us = 1.0
pareto_alpha = 1.5
max_us = 0

[ops.getattr]
concurrency_cap = 32
queue_cap = 0

